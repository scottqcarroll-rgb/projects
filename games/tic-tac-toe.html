<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 { font-size: 2rem; margin-bottom: 1rem; letter-spacing: 2px; }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a0d8ef;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      font-size: 3rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; transform: scale(1.04); }

    .cell.x { color: #e94560; }
    .cell.o { color: #0f9b8e; }
    .cell.win { background: #0f3460; outline: 3px solid #a0d8ef; }

    #reset {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #0f3460;
      color: #eee;
      border: 2px solid #a0d8ef;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s;
    }

    #reset:hover { background: #1a4a8a; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board"></div>
  <button id="reset">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diagonals
    ];

    let board, current, over;

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      document.getElementById('status').textContent = "Player X's turn";
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
    }

    function checkWin() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    function handleClick(idx) {
      if (over || board[idx]) return;
      board[idx] = current;

      const cell = document.querySelectorAll('.cell')[idx];
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winLine = checkWin();
      if (winLine) {
        winLine.forEach(i => document.querySelectorAll('.cell')[i].classList.add('win'));
        document.getElementById('status').textContent = `Player ${current} wins!`;
        over = true;
      } else if (board.every(Boolean)) {
        document.getElementById('status').textContent = "It's a draw!";
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        document.getElementById('status').textContent = `Player ${current}'s turn`;
      }
    }

    // Build board
    const boardEl = document.getElementById('board');
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.addEventListener('click', () => handleClick(i));
      boardEl.appendChild(cell);
    }

    document.getElementById('reset').addEventListener('click', init);
    init();
  </script>
</body>
</html>
